<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - @longledesign</title>
    <!-- Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body>
    <div class="dashboard-container">
        <div class="header-actions">
            <div>
                <h1 class="title" style="margin-bottom: 8px;">Analytics 📊</h1>
                <p class="handle" style="margin-bottom: 0;">Bảng điều khiển giám sát thời gian thực</p>
            </div>
            <div class="filter-group">
                <button class="filter-btn" data-time="day">Hôm nay</button>
                <button class="filter-btn" data-time="week">Tuần này</button>
                <button class="filter-btn" data-time="month">Tháng này</button>
                <button class="filter-btn active" data-time="all">Tất cả</button>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="trafficChart"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="totalViews">--</div>
                <div class="label">Người xem Profile</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalClicks">--</div>
                <div class="label">Tổng cú click (Tất cả link)</div>
            </div>
        </div>

        <div class="section-title" style="margin-top: 24px;">Chi tiết số Click theo từng đường Link</div>
        <table>
            <thead>
                <tr>
                    <th>Tên Link / Nút Bấm</th>
                    <th style="text-align: right;">Số Click</th>
                </tr>
            </thead>
            <tbody id="clickTableBody">
                <tr>
                    <td colspan="2" style="text-align: center;">Đang tải dữ liệu từ Supabase...</td>
                </tr>
            </tbody>
        </table>

        <a href="../index.html" class="link-card"
            style="margin-top: 32px; justify-content: center; background-color: var(--text-main); color: white; border-radius: 16px;">
            <i data-lucide="arrow-left" width="20" height="20" style="margin-right: 8px;"></i> Trở về trang Profile
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script type="module" src="../assets/js/dashboard.js"></script>
</body>

</html>
