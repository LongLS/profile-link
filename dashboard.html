<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - @longledesign</title>
    <!-- Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .stat-card .value {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .stat-card .label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-collapse: collapse;
            font-size: 15px;
        }
        th, td {
            padding: 18px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background: var(--card-bg);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tbody tr:hover {
            background-color: var(--social-bg-hover);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1 class="title" style="margin-bottom: 8px;">Analytics 📊</h1>
        <p class="handle" style="margin-bottom: 32px;">Bảng điều khiển giám sát thời gian thực</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="totalViews">--</div>
                <div class="label">Người xem Profile</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalClicks">--</div>
                <div class="label">Tổng cú click (Tất cả link)</div>
            </div>
        </div>

        <div class="section-title" style="margin-top: 24px;">Chi tiết số Click theo từng đường Link</div>
        <table>
            <thead>
                <tr>
                    <th>Tên Link / Nút Bấm</th>
                    <th style="text-align: right;">Số Click</th>
                </tr>
            </thead>
            <tbody id="clickTableBody">
                <tr><td colspan="2" style="text-align: center;">Đang tải dữ liệu từ Supabase...</td></tr>
            </tbody>
        </table>
        
        <a href="index.html" class="link-card" style="margin-top: 32px; justify-content: center; background-color: var(--text-main); color: white; border-radius: 16px;">
            <i data-lucide="arrow-left" width="20" height="20" style="margin-right: 8px;"></i> Trở về trang Profile
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
